services:
  # 1. Backend Express API Server
  - type: web
    name: vyapaar-api-server
    env: node
    plan: free
    buildCommand: npx pnpm install && npx pnpm --filter @workspace/api-server build
    startCommand: npx pnpm --filter @workspace/api-server start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: vyapaar-postgres
          property: connectionString

  # 2. Frontend React Vite Application
  - type: web
    name: vyapaar-ai-frontend
    env: static
    plan: free
    buildCommand: npx pnpm install && npx pnpm --filter @workspace/vyapaar-ai build
    staticPublishPath: artifacts/vyapaar-ai/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: vyapaar-postgres
    plan: free
